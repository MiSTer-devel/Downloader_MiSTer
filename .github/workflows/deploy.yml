name: Deploy

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA that passed the private test suite.
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      NEW_RELEASE: ${{ steps.check-changes.outputs.NEW_RELEASE }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.sha }}

    - uses: ./.github/actions/setup-python

    - name: Verify tested SHA is current main
      run: |
        set -euo pipefail

        if [[ ! "${REQUESTED_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
          echo "Invalid SHA: ${REQUESTED_SHA}" >&2
          exit 1
        fi

        git fetch origin main

        test "$(git rev-parse HEAD)" = "${REQUESTED_SHA}"
        test "$(git rev-parse origin/main)" = "${REQUESTED_SHA}"
      env:
        REQUESTED_SHA: ${{ inputs.sha }}

    - name: Check for changes
      id: check-changes
      run: |
        set -euo pipefail

        SKIP_COMMIT=true ./src/build.sh | sha256sum > latest.id
        git add latest.id

        if ! git diff --exit-code \
                     --unified=0 \
                     --ignore-matching-lines='export COMMIT' \
                     origin/main -- latest.id
        then
          echo "New build detected." >> $GITHUB_STEP_SUMMARY
          echo "NEW_RELEASE=yes" >> "$GITHUB_OUTPUT"
        else
          echo "Skipping build, no changes detected." >> $GITHUB_STEP_SUMMARY
          echo "NEW_RELEASE=no" >> "$GITHUB_OUTPUT"
        fi

  build:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.NEW_RELEASE == 'yes'

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.sha }}

    - uses: ./.github/actions/setup-python

    - name: Build
      run: |
        set -euo pipefail

        SKIP_COMMIT=true ./src/build.sh | sha256sum > latest.id
        ZIP_FILE="$(pwd)/dont_download.zip" ./src/build.sh > dont_download.sh
        cp src/downloader.zip downloader.zip

    - name: Build Test
      run: ./.github/downloader_test.py distribution_mister $(pwd)/.github/fixtures/tiny_db.json
      env:
        DOWNLOADER_SOURCE: ./dont_download.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          latest.id
          dont_download.zip
          dont_download.sh
          downloader.zip

  pc-launcher-test:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            python-cmd: python3
          - os: windows-latest
            python-cmd: python
          - os: macos-latest
            python-cmd: python

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.sha }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: PC Launcher Build Test on ${{ matrix.os }}
      run: ${{ matrix.python-cmd }} src/pc_launcher.py
      env:
        DEFAULT_DB_ID: distribution_mister
        DEFAULT_DB_URL: ${{ github.workspace }}/.github/fixtures/tiny_db.json
        DEBUG: true
        PC_LAUNCHER_NO_WAIT: '1'
        DOWNLOADER_SOURCE: ${{ github.workspace }}/dont_download.zip

  compile-release:
    runs-on: ubuntu-latest
    needs: pc-launcher-test

    steps:
    - run: echo "owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER,,}")" >> "$GITHUB_OUTPUT"
      id: vars

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.sha }}

    - name: Prepare main branch
      run: |
        set -euo pipefail

        git fetch origin main
        test "$(git rev-parse origin/main)" = "${REQUESTED_SHA}"
        git checkout -B main "${REQUESTED_SHA}"
      env:
        REQUESTED_SHA: ${{ inputs.sha }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - uses: docker/setup-qemu-action@v2
      with:
        platforms: arm/v7

    - uses: docker/setup-buildx-action@v2

    - uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Nuitka
      uses: docker/build-push-action@v4
      with:
        context: .
        file: src/Dockerfile.nuitka
        platforms: linux/arm/v7
        push: true
        tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/arm32v7-nuitka:latest
        cache-from: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner_lc }}/arm32v7-nuitka:cache
        cache-to: type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner_lc }}/arm32v7-nuitka:cache,mode=max

    - name: Compile
      run: ./src/compile.sh downloader_bin
      env:
        NUITKA_IMAGE: ghcr.io/${{ steps.vars.outputs.owner_lc }}/arm32v7-nuitka:latest

    - name: Release
      id: release
      run: |
        git config --global user.email "theypsilon@gmail.com"
        git config --global user.name "The CI/CD Bot"
        ./.github/release.sh
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
